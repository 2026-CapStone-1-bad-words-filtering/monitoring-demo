version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: filtering_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: filter_system
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - filtering_network

  # 2. API Server
  api-server:
    build: ./api-server
    container_name: filtering_api
    restart: always
    depends_on:
      - db
      - analyzer
    volumes:
      # 수정: ./api-server 전체를 /app으로 연결하여 /app/app 구조 유지
      - ./api-server:/app
    environment:
      - DATABASE_URL=mysql+pymysql://root:password@db:3306/filter_system
      - ANALYZER_URL=http://analyzer:8000
    ports:
      - "8000:8000"
    networks:
      - filtering_network

  # 3. Analyzer
  analyzer:
    build: ./analyzer
    container_name: filtering_analyzer
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # 수정: ./analyzer 전체를 /app으로 연결
      # 이렇게 하면 /app/auth와 /app/app이 모두 올바른 위치에 생성됩니다.
      - ./analyzer:/app
    networks:
      - filtering_network

  inference-engine:
    build: ./inference-engine
    volumes:
      - ./inference-engine/models:/app/models
    expose:
      - "8080"
    networks:
      - filtering_network

networks:
  filtering_network:
    driver: bridge

volumes:
  mysql_data: