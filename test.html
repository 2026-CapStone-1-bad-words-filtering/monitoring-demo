<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Remote Login Control</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        #screen {
            border: 2px solid #333;
            cursor: crosshair;
            background: #eee;
            max-width: 100%;
        }

        #saveBtn {
            margin-top: 15px;
            padding: 12px 24px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        #saveBtn:hover {
            background-color: #45a049;
        }

        .info {
            margin-bottom: 10px;
            color: #555;
        }
    </style>
</head>

<body>
    <h2>[캡스톤] 원격 제어 및 세션 저장</h2>
    <div class="info">화면을 클릭하거나 키보드를 입력하여 로그인한 뒤, 아래 저장 버튼을 누르세요.</div>

    <canvas id="screen" width="800" height="600"></canvas><br>

    <button id="saveBtn">로그인 완료 및 세션 저장</button>

    <script>
        // 1. 발급받은 세션 ID를 여기에 정확히 입력하세요.
        const sessionId = "140197289405712";

        // 2. 웹소켓 연결
        const ws = new WebSocket(`ws://localhost:8000/ws/remote-login/${sessionId}`);
        const canvas = document.getElementById("screen");
        const ctx = canvas.getContext("2d");

        // --- [소켓 상태 로그] ---
        ws.onopen = () => console.log("✅ WebSocket 연결 성공");
        ws.onerror = (err) => console.error("❌ WebSocket 에러:", err);
        ws.onclose = () => console.log("🔌 WebSocket 연결 종료");

        // --- [이미지 수신 및 화면 그리기] ---
        ws.onmessage = (event) => {
            if (event.data instanceof Blob) {
                const url = URL.createObjectURL(event.data);
                const img = new Image();
                img.onload = () => {
                    // 서버에서 온 실제 화면 해상도(예: 1280x1024)에 맞게 캔버스 내부 크기 동기화
                    if (canvas.width !== img.width) canvas.width = img.width;
                    if (canvas.height !== img.height) canvas.height = img.height;

                    ctx.drawImage(img, 0, 0);
                    URL.revokeObjectURL(url); // 메모리 누수 방지 (매우 중요)
                };
                img.src = url;
            }
        };

        // --- [마우스 클릭 전송 (비율 보정 포함)] ---
        canvas.onclick = (e) => {
            const rect = canvas.getBoundingClientRect();

            // 화면에 보이는 캔버스 크기와 실제 이미지 해상도 비율 계산
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;

            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: "click",
                    x: Math.round(clickX),
                    y: Math.round(clickY)
                }));
                console.log(`클릭 전송됨: ${Math.round(clickX)}, ${Math.round(clickY)}`);
            }
        };

        // --- [키보드 입력 전송] ---
        window.onkeydown = (e) => {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: "keydown",
                    key: e.key
                }));
            }

            // 브라우저 기본 스크롤 동작 방지 (백스페이스 뒤로가기 등)
            if (["Backspace", "ArrowUp", "ArrowDown", "Space"].includes(e.key)) {
                // 입력창에 포커스가 없을 때만 기본 동작을 막고 싶다면 이 부분은 생략해도 됩니다.
                // e.preventDefault(); 
            }
        };

        // --- [세션 저장 버튼 이벤트 (가장 중요)] ---
        document.getElementById("saveBtn").onclick = () => {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "save_session" }));
                alert("서버에 세션 저장 신호를 보냈습니다! 터미널 로그를 확인하세요.");
            } else {
                alert("웹소켓이 연결되어 있지 않습니다. 서버나 세션ID를 확인하세요.");
            }
        };
    </script>
</body>

</html>
